<!DOCTYPE html>
<html lang="zh-CN">

<head>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/styles.css">
</head>

        </mask>

    </a>

      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">

    <div class="text-center mb-4 sm:mb-6 shrink-0">

        </svg>
        <span data-i18n="title"></span>
      </h1>
    </div>
    <div id="drop-zone" class="w-full flex-grow bg-white dark:bg-gray-900 border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-2xl flex flex-col relative overflow-hidden cursor-pointer">
      <input type="file" id="file-input" multiple accept="image/*" class="hidden">
      <div id="image-grid" class="w-full h-full overflow-y-auto p-4 sm:p-6 content-start grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 hidden z-10"></div>
      <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-0">
        <p class="text-gray-500 text-sm text-center"><span data-i18n="emptyTitle"></span><br><span data-i18n="emptySub"></span></p>
      </div>
    </div>
  </div>

  <div id="step-2-3" class="step-container hidden-step bg-gray-100 dark:bg-gray-950">
    <canvas id="main-canvas" class="w-full h-full block"></canvas>
  </div>

  <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 w-[min(350px,calc(100vw-2rem))]" style="bottom: calc(1.5rem + env(safe-area-inset-bottom));">
    <div id="ui-step1-floating" class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-md px-6 py-3 rounded-full shadow-lg border border-gray-200/50 dark:border-gray-800/50 flex items-center justify-between hidden">
      <button class="btn btn-secondary" id="btn-clear-all" data-i18n="clear" disabled></button>
      <label class="flex items-center gap-2 cursor-pointer group">
        <div class="relative flex items-center">
          <input type="checkbox" id="direction-toggle" class="sr-only peer">
          <div class="w-10 h-5 bg-gray-300 dark:bg-gray-600 rounded-full peer-checked:bg-blue-500 transition-colors"></div>
          <div class="absolute left-0.5 w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-5"></div>
        </div>
        <span class="text-xs text-gray-700 dark:text-gray-300 select-none" id="direction-text" data-i18n="vertical"></span>
      </label>
      <button class="btn btn-primary" id="btn-next-1" data-i18n="nextStep" disabled></button>
    </div>

    <div id="ui-step2-global" class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-md px-6 py-3 rounded-full shadow-lg border border-gray-200/50 dark:border-gray-800/50 flex items-center justify-between hidden">
      <button class="btn btn-secondary" id="btn-global-prev" data-i18n="prevStep"></button>
      <span class="text-xs text-gray-500 dark:text-gray-300" data-i18n="clickSeam"></span>
      <button class="btn btn-primary" id="btn-global-next" data-i18n="nextStep"></button>
    </div>

    <div id="ui-step2-seam" class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-md px-6 py-3 rounded-full shadow-lg border border-gray-200/50 dark:border-gray-800/50 flex items-center justify-between hidden">
      <button class="btn btn-secondary" id="btn-seam-cancel" data-i18n="cancel"></button>
      <label class="flex items-center gap-2 cursor-pointer group">
        <div class="relative flex items-center">
          <input type="checkbox" id="seam-mode-toggle" class="sr-only peer">
          <div class="w-10 h-5 bg-gray-300 dark:bg-gray-600 rounded-full peer-checked:bg-blue-500 transition-colors"></div>
          <div class="absolute left-0.5 w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-5"></div>
        </div>
        <span class="text-xs text-gray-700 dark:text-gray-300" id="seam-mode-text" data-i18n="indepCrop"></span>
      </label>
      <button class="btn btn-primary" id="btn-seam-confirm" data-i18n="done"></button>
    </div>

    <div id="ui-step3-crop" class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-md px-6 py-3 rounded-full shadow-lg border border-gray-200/50 dark:border-gray-800/50 flex items-center justify-between hidden">
      <button class="btn btn-secondary" id="btn-crop-prev" data-i18n="prevStep"></button>
      <button class="btn btn-secondary" id="btn-crop-restart" data-i18n="restart"></button>
      <button class="btn btn-primary" id="btn-crop-save" data-i18n="export"></button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module" src="./js/app.js"></script>
</body>

</html>
